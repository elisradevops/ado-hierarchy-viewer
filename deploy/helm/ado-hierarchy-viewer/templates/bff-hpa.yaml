apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ado-hierarchy-viewer.fullname" . }}-bff
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ado-hierarchy-viewer.fullname" . }}-bff
  minReplicas: {{ .Values.hpa.bff.minReplicas }}
  maxReplicas: {{ .Values.hpa.bff.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.bff.targetCPUUtilizationPercentage }}
