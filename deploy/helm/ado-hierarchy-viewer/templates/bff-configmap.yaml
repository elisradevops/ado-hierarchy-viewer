apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: {{ .Values.global.namespace }}
data:
  ADO_API_VERSION: {{ .Values.bff.config.adoApiVersion | quote }}
  ADO_REQUEST_TIMEOUT_MS: {{ .Values.bff.config.adoRequestTimeoutMs | quote }}
  CACHE_TTL_MS: {{ .Values.bff.config.cacheTtlMs | quote }}
  LOG_LEVEL: {{ .Values.bff.config.logLevel | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.bff.config.corsAllowedOrigins | quote }}
