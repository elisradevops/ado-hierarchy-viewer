apiVersion: v1
kind: Service
metadata:
  name: {{ include "ado-hierarchy-viewer.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    {{- include "ado-hierarchy-viewer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
