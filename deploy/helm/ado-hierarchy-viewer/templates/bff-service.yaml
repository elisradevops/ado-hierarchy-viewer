apiVersion: v1
kind: Service
metadata:
  name: {{ include "ado-hierarchy-viewer.fullname" . }}-bff
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    {{- include "ado-hierarchy-viewer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bff
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
