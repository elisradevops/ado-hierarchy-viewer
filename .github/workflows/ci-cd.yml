name: '🚀 CI/CD'
on:
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '.github/**'
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  workflow_dispatch: {}

jobs:
  build:
    name: 🔨 build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: 📚 checkout
        uses: actions/checkout@v4

      - name: 🟢 node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 install deps
        run: npm ci

      # query-match-core is a file: dependency of both bff and frontend — must be
      # built first so its dist/ is present when the other workspaces compile.
      - name: 🔨 build query-match-core
        run: npm run build --workspace=packages/query-match-core

      # BFF — standalone-mode regression coverage (the frontend talks to this
      # server when not running as an ADO extension).
      - name: 🔍 lint bff
        run: npm run lint --workspace=bff

      - name: 🔨 build bff
        run: npm run build --workspace=bff

      - name: 🧪 test bff
        run: npm test --workspace=bff -- --forceExit

      # Frontend — covers both extension mode (adoDirect/adoSdk/useAdoContext) and
      # standalone mode (hierarchyApi/BFF client) from the same test suite.
      - name: 🔍 lint frontend
        run: npm run lint --workspace=frontend

      - name: 🔨 build frontend
        run: npm run build --workspace=frontend

      - name: 🧪 test frontend
        run: npm test --workspace=frontend

      - name: ⬆️ upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/ado-extension/dist
          if-no-files-found: error
          retention-days: 3

      # Packages the ADO extension exactly as publish would — catches a broken
      # manifest, missing contribution assets, or bad tfx invocation *before* merge,
      # since a new version is only ever shipped as this one .vsix file.
      - name: 📦 package VSIX (dry run)
        working-directory: frontend
        run: npm run package -- --override "{\"version\":\"0.0.0\"}"

      - name: ⬆️ upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-preview
          path: frontend/ado-extension/out/*.vsix
          if-no-files-found: error
          retention-days: 7

  publish:
    name: 🚀 publish
    needs: build
    # Never runs on a PR — only after build succeeds on push to main, or a manual
    # dispatch. A job skipped by this condition reports as skipped, which GitHub
    # treats as passing for a required status check, so it doesn't block PR merges.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📚 checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ELISRADEVOPS_ACCESS_TOKEN }}

      - name: 🟢 node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: 'Automated Version Bump'
        uses: 'phips28/gh-action-bump-version@master'
        id: bump_version
        with:
          commit-message: 'CI: bumps version to {{version}} [skip ci]'

      - name: 🐳 set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master

      # Pushes the reusable VSIX-builder image only — it doesn't bundle a specific
      # frontend build. At runtime it expects dist/ + vss-extension.json mounted in
      # (VSIX_SRC_DIST / VSIX_SRC_MANIFEST) and packages whatever it's given via
      # tfx, auto-stamping a timestamp-based version (see create-vsix.sh). Actual
      # VSIX generation happens later, on demand, driven from Kubernetes in
      # production — not baked into this pipeline.
      - name: 🐳 build and push (vsix-builder)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/src/deployment/dockerfile.vsix-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            elisradevops/ado-hierarchy-viewer-vsix-builder:${{ steps.package-version.outputs.current-version }}
            elisradevops/ado-hierarchy-viewer-vsix-builder:latest
