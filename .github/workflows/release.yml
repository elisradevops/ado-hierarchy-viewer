name: '🚀 publish - ado-hierarchy-viewer'
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  workflow_dispatch: {}

jobs:
  release:
    name: 🚀 publish
    runs-on: ubuntu-latest
    steps:
      - name: 📚 checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ELISRADEVOPS_ACCESS_TOKEN }}

      - name: 🟢 node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: 'Automated Version Bump'
        uses: 'phips28/gh-action-bump-version@master'
        id: bump_version
        with:
          commit-message: 'CI: bumps version to {{version}} [skip ci]'

      - name: 🐳 set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master

      # Pushes the reusable VSIX-builder image only — it doesn't bundle a specific
      # frontend build. At runtime it expects dist/ + vss-extension.json mounted in
      # (VSIX_SRC_DIST / VSIX_SRC_MANIFEST) and packages whatever it's given via
      # tfx. VSIX_VERSION is baked in as the same version as the image tag, so the
      # extension version it produces by default matches the app/image version —
      # actual VSIX generation happens later, on demand, driven from Kubernetes in
      # production — not baked into this pipeline.
      - name: 🐳 build and push (vsix-builder)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/src/deployment/dockerfile.vsix-builder
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VSIX_VERSION=${{ steps.package-version.outputs.current-version }}
          tags: |
            elisradevops/ado-hierarchy-viewer-vsix-builder:${{ steps.package-version.outputs.current-version }}
            elisradevops/ado-hierarchy-viewer-vsix-builder:latest
